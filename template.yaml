AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI StoryCast - Serverless Text-to-Audio Publishing Platform

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        JOB_TABLE_NAME: !Ref StorycastJobsTable
        INPUT_BUCKET_NAME: !Ref InputBucket
        OUTPUT_BUCKET_NAME: !Ref OutputBucket
        POLLY_OUTPUT_PREFIX: output/
        SNS_TOPIC_ARN: !Ref StorycastNotificationsTopic
  Api:
    Cors:
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'content-type,authorization'"
      AllowOrigin: "'*'"

Parameters:
  ProjectName:
    Type: String
    Default: ai-storycast
  EnableCloudFront:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"

Conditions:
  CreateCloudFront: !Equals [!Ref EnableCloudFront, "true"]

Resources:
  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-${AWS::AccountId}-${AWS::Region}-input"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-${AWS::AccountId}-${AWS::Region}-output"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  StorycastJobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-jobs"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: jobId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CreatedAtIndex
          KeySchema:
            - AttributeName: createdAt
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  StorycastNotificationsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${ProjectName}-notifications"

  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "${ProjectName}-api"
      StageName: prod

  GeneratePresignedUploadUrlLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-generate-upload-url"
      CodeUri: generate-upload-url/
      Handler: app.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub "${InputBucket.Arn}/input/*"
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt StorycastJobsTable.Arn
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: "*"
      Events:
        GenerateUploadUrlApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /jobs/upload-url
            Method: post

  CreateJobFromUrlLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-create-job-from-url"
      CodeUri: create-job-from-url/
      Handler: app.handler
      Timeout: 60
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub "${InputBucket.Arn}/input/*"
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt StorycastJobsTable.Arn
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: "*"
      Events:
        CreateFromUrlApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /jobs/from-url
            Method: post

  StartNarrationJobLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-start-narration-job"
      CodeUri: start-storycast/
      Handler: app.handler
      Timeout: 120
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "${InputBucket.Arn}/input/*"
            - Effect: Allow
              Action:
                - polly:StartSpeechSynthesisTask
              Resource: "*"
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
                - dynamodb:GetItem
              Resource: !GetAtt StorycastJobsTable.Arn
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: "*"
      Events:
        InputObjectCreated:
          Type: S3
          Properties:
            Bucket: !Ref InputBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: input/
                  - Name: suffix
                    Value: .txt

  CheckNarrationStatusLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-check-narration-status"
      CodeUri: check-storycast-status/
      Handler: app.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt StorycastJobsTable.Arn
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "${OutputBucket.Arn}/*"
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: "*"
      Events:
        CheckStatusApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /jobs/{jobId}
            Method: get

  PollyTaskStatusUpdaterLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-polly-task-status-updater"
      CodeUri: polly-task-status-updater/
      Handler: app.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
                - dynamodb:Scan
              Resource: !GetAtt StorycastJobsTable.Arn
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref StorycastNotificationsTopic
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: "*"
      Events:
        PollyTaskStateChange:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.polly
              detail-type:
                - Polly Synthesis Task State Change

  OutputBucketPollyPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OutputBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowPollyToWriteOutput
            Effect: Allow
            Principal:
              Service: polly.amazonaws.com
            Action:
              - s3:PutObject
            Resource: !Sub "${OutputBucket.Arn}/output/*"
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  NotificationsTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref StorycastNotificationsTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowPollyToPublishTaskUpdates
            Effect: Allow
            Principal:
              Service: polly.amazonaws.com
            Action: sns:Publish
            Resource: !Ref StorycastNotificationsTopic
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Condition: CreateCloudFront
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AudioDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: CreateCloudFront
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - DomainName: !GetAtt OutputBucket.RegionalDomainName
            Id: output-origin
            S3OriginConfig: {}
            OriginAccessControlId: !Ref CloudFrontOAC
        DefaultCacheBehavior:
          TargetOriginId: output-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  OutputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: CreateCloudFront
    Properties:
      Bucket: !Ref OutputBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${OutputBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AudioDistribution}"

Outputs:
  ApiBaseUrl:
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod"
  InputBucketName:
    Value: !Ref InputBucket
  OutputBucketName:
    Value: !Ref OutputBucket
  JobsTableName:
    Value: !Ref StorycastJobsTable
  NotificationsTopicArn:
    Value: !Ref StorycastNotificationsTopic
  CloudFrontDomainName:
    Condition: CreateCloudFront
    Value: !GetAtt AudioDistribution.DomainName
